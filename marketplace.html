<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="head.title">ButlerCrab — 舊電腦重生成為安全隱私的本地家庭總管 AI</title>
  <meta name="description" content="ButlerCrab 讓您家中的舊桌機與舊筆電重生成為 24 小時運行的安全家庭總管 AI，守護居家安全、自動打理日常瑣事，100% 本地運行保護全家隱私。">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1.2">
</head>

<body>

  <nav id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo" id="nav-logo">
        <svg class="logo-icon" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M38 72 C38 48, 90 48, 90 72 C90 85, 38 85, 38 72 Z" fill="#ef4444" />
          <path d="M52 46 V50" stroke="#ef4444" stroke-width="4" stroke-linecap="round" />
          <path d="M76 46 V50" stroke="#ef4444" stroke-width="4" stroke-linecap="round" />
          <circle cx="52" cy="42" r="5" fill="#ffffff" />
          <circle cx="76" cy="42" r="5" fill="#ffffff" />
          <circle cx="52" cy="42" r="2" fill="#000000" />
          <circle cx="76" cy="42" r="2" fill="#000000" />
          <path d="M34 54 C18 46, 24 22, 42 36 C36 42, 38 48, 34 54 Z" fill="#ef4444" />
          <path d="M94 54 C110 46, 104 22, 86 36 C92 42, 90 48, 94 54 Z" fill="#ef4444" />
          <!-- Butler Bowtie -->
          <path d="M64 83 L50 75 L50 91 Z" fill="#0f172a" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
          <path d="M64 83 L78 75 L78 91 Z" fill="#0f172a" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
          <rect x="60" y="79" width="8" height="8" rx="2.5" fill="#1e293b" stroke="#ffffff" stroke-width="1.5" />
        </svg>
        <span>ButlerCrab</span>
      </a>

      <div class="nav-links">
        <a href="index.html#features" id="nav-link-features" data-i18n="nav.features">功能特性</a>
        <a href="marketplace.html" id="nav-link-skills" data-i18n="nav.skills">技能市集</a>
        <a href="https://github.com" target="_blank" id="nav-link-dev" data-i18n="nav.dev_docs">開發者文件</a>
        <a href="https://github.com" target="_blank" id="nav-link-github">GitHub</a>
        <div class="lang-selector-container">
          <select id="lang-select" aria-label="選擇語言">
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh-CN">简体中文</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
          </select>
        </div>
        <button id="theme-toggle" aria-label="切換主題模式">
          <!-- 太陽圖示 -->
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
          <!-- 月亮圖示 -->
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
        </button>
        <a href="index.html#download" class="btn btn-secondary nav-cta" id="nav-btn-download"
          data-i18n="nav.download">立即下載</a>
      </div>
    </div>
  </nav>

  <!-- 市集專屬 Header 區域 -->
  <section id="marketplace-hero"
    style="padding: 120px 0 60px 0; border-bottom: 1px solid var(--border); position: relative; overflow: hidden;">
    <div class="hero-glow" style="top: -20%; opacity: 0.15;"></div>
    <div class="container" style="text-align: center;">
      <h1 style="font-size: 44px; font-weight: 800; margin-bottom: 16px; letter-spacing: -1.5px;"
        data-i18n="skills.title">官方技能市集目錄</h1>
      <p style="font-size: 18px; color: var(--text-muted); max-width: 600px; margin: 0 auto;" data-i18n="skills.desc">
        一鍵安裝，快速擴展您的 AI 助理能力</p>
    </div>
  </section>

  <!-- 技能市集主體 -->
  <section id="skills" style="padding: 60px 0 100px 0;">
    <div class="container">
      <div class="skills-filter">
        <button class="filter-btn active" data-category="all" data-i18n="skills.filter.all">全部技能</button>
        <button class="filter-btn" data-category="finance" data-i18n="skills.filter.finance">金融與理財</button>
        <button class="filter-btn" data-category="communication" data-i18n="skills.filter.communication">通訊與通知</button>
        <button class="filter-btn" data-category="home_automation"
          data-i18n="skills.filter.home_automation">智慧家居</button>
      </div>

      <div class="skills-grid" id="skills-catalog">
        <!-- 透過 JS 動態載入 registry.json 內容 -->
      </div>
    </div>
  </section>

  <!-- 技能詳細資訊 Modal -->
  <div id="skill-detail-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close-btn" aria-label="關閉視窗">&times;</button>
      <div class="modal-body">
        <div class="modal-skill-header">
          <span class="modal-skill-icon">🧩</span>
          <div>
            <h3 class="modal-skill-name"></h3>
            <div class="modal-skill-meta">
              <span class="modal-skill-version"></span>
              <span class="modal-skill-author"></span>
              <span class="modal-skill-category"></span>
            </div>
          </div>
        </div>
        <p class="modal-skill-description"></p>

        <!-- 安全性警告與申請之權限 -->
        <div class="modal-section modal-permissions-section">
          <h4 data-i18n="modal.permissions_title">安全性權限需求</h4>
          <div class="modal-permissions-list"></div>
        </div>

        <!-- 環境變數配置指引 -->
        <div class="modal-section modal-env-section">
          <h4 data-i18n="modal.env_title">環境變數配置指引</h4>
          <div class="modal-env-list"></div>
        </div>

        <!-- 說明書載入 -->
        <div class="modal-section modal-readme-section">
          <h4 data-i18n="modal.readme_title">詳細說明文件 (README)</h4>
          <div class="modal-readme-content"></div>
        </div>

        <!-- 用戶端安裝指引區塊 (替代原本的 installCmd 一鍵複製區) -->
        <div class="modal-install-guide">
          <div class="guide-icon">🛠️</div>
          <div class="guide-text">
            <strong data-i18n="modal.install_guide_title">如何安裝此技能？</strong>
            <p data-i18n="modal.install_guide_desc">本市集僅供功能展示與環境配置參考。如需安裝，請啟動您的 ButlerCrab 用戶端，至「設定」 >
              「技能市集」中搜尋此技能並點擊一鍵安裝。</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="container footer-container">
      <div class="footer-brand">
        <span class="brand-name">ButlerCrab</span>
        <p data-i18n="footer.desc">100% 本地運行的隱私優先 AI Agent 協作平台</p>
      </div>
      <div class="footer-copyright" data-i18n="footer.copyright">
        © 2026 QUARTIMES INC. 基於 BSL 1.1 授權協議釋出。
      </div>
    </div>
  </footer>



  <script src="app.js?v=1.3"></script>
</body>

</html>
